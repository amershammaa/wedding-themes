<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Riviera · Layla &amp; Karim</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--sea:#2e6376;--ink:#14242a;--font-display:'Fraunces',Georgia,serif;--font-sans:'Inter',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-sans);background:var(--ink);color:#fff;overflow:hidden}
#hero{position:fixed;inset:0;overflow:hidden;background:var(--ink)}
#hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#hero .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,36,42,.82),rgba(20,36,42,.15) 45%,rgba(20,36,42,.45))}
#hero .masthead{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:64px 24px 0;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.8)}
#hero .title{position:absolute;left:0;right:0;bottom:0;padding:0 24px 96px}
#hero .title h1{font-family:var(--font-display);font-size:clamp(56px,16vw,140px);line-height:.92;color:#fff;max-width:46rem}
#hero .title h1 .b{font-style:italic;font-weight:300;color:rgba(255,255,255,.92)}
#hero .title h1 .j{font-size:.42em;font-style:normal;letter-spacing:.3em;color:rgba(255,255,255,.7);margin-inline-end:.7rem;vertical-align:middle}
#hero .meta{margin-top:22px;display:flex;flex-wrap:wrap;gap:4px 18px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.85)}
#hero .meta .dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.6);align-self:center}
#hero .rise{opacity:0;transform:translateY(16px)}
#hero.shown .rise{opacity:1;transform:none;transition:opacity 1s ease,transform 1s ease}
#hero.shown .rise.r2{transition-delay:.18s}
#scrollhint{position:absolute;left:0;right:0;bottom:26px;text-align:center;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.6);opacity:0}
#hero.shown #scrollhint{opacity:1;transition:opacity 1s ease 1.2s;animation:fl 2.6s ease 2s infinite}
@keyframes fl{0%,100%{opacity:.4}50%{opacity:.8}}
#cover{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:var(--sea);cursor:pointer;perspective:2200px;transition:opacity .5s ease 1.05s}
#cover.opening{opacity:0;pointer-events:none}
#cover .card{position:relative;width:min(82vw,380px);height:min(82vh,560px);border-radius:3px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.45);transform-origin:left center;transform:rotateY(0);transition:transform 1.25s cubic-bezier(.55,0,.2,1);transform-style:preserve-3d}
#cover.opening .card{transform:rotateY(168deg)}
#cover .photo{position:absolute;inset:0;background:#2e6376 center/cover}
#cover .cgrad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,40,48,.35),rgba(20,40,48,.15) 38%,rgba(20,40,48,.72))}
#cover .clines{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:28px;color:#fff}
#cover .crow{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:rgba(255,255,255,.85)}
#cover .ctitle{text-align:center}
#cover .ctitle .eye{display:block;font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.85)}
#cover .ctitle .names{font-family:var(--font-display);display:block;margin-top:12px;font-size:clamp(40px,12vw,76px);line-height:.95;color:#fff}
#cover .ctitle .names .amp{font-style:italic;color:rgba(255,255,255,.85);margin:0 8px}
#cover .spine{position:absolute;inset-block:0;inset-inline-start:0;width:24px;background:linear-gradient(to right,rgba(255,255,255,.22),rgba(255,255,255,0))}
#cover .hint{position:absolute;left:0;right:0;bottom:7%;text-align:center;font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.85);transition:opacity .35s;animation:fl 2.6s ease infinite}
#cover.opening .hint{opacity:0}
.note{position:fixed;left:0;right:0;bottom:6px;text-align:center;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);z-index:120;pointer-events:none}
</style>
</head>
<body>
<section id="hero">
  <video id="hv" muted loop playsinline preload="auto" poster="hero-poster.jpg">
    <source src="hero-loop.mp4" type="video/mp4">
  </video>
  <div class="grad"></div>
  <div class="masthead"><span class="rise">Save the date</span><span class="rise r2">Vol. 2026</span></div>
  <div class="title">
    <h1 class="rise"><span>Layla</span><br><span class="b"><span class="j">AND</span>Karim</span></h1>
    <div class="meta rise r2"><span>Saturday, 19 September 2026</span><span class="dot"></span><span>Beirut · Lebanon</span></div>
  </div>
  <div id="scrollhint">Scroll to explore</div>
</section>
<div id="cover">
  <div class="card">
    <div class="photo" style="background-image:url('hero-poster.jpg')"></div>
    <div class="cgrad"></div>
    <div class="clines">
      <div class="crow"><span>Save the date</span><span>Vol. 2026</span></div>
      <div class="ctitle"><span class="eye">Together by the sea</span><span class="names">Layla<span class="amp">&amp;</span>Karim</span></div>
      <div class="crow"><span>19 September 2026</span><span>Beirut</span></div>
    </div>
    <div class="spine"></div>
  </div>
  <div class="hint">Tap to open</div>
</div>
<div class="note">Riviera theme · video opener preview</div>
<script>
(function(){
  var cover=document.getElementById('cover'), hero=document.getElementById('hero'), v=document.getElementById('hv');
  function open(){
    if(cover.classList.contains('opening'))return;
    cover.classList.add('opening');
    if(v){v.muted=true;var p=v.play();if(p&&p.catch)p.catch(function(){});}
    hero.classList.add('shown');
    setTimeout(function(){cover.style.display='none';},1700);
  }
  cover.addEventListener('click',open);
  cover.addEventListener('touchend',function(e){e.preventDefault();open();},{passive:false});
})();
</script>
</body>
</html>
